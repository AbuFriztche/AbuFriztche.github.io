<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Doğrulama</title>

<style>
body{
    background:#2c2f33;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:150px;
}
</style>

</head>

<body>

<h2>Discord doğrulanıyor...</h2>

<script>

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(code){

document.body.innerHTML = "<h2>Giriş başarılı!</h2><p>Authorization Code:</p><code>"+code+"</code>";

console.log("Discord Code:", code);

// Buradan backend API'ye gönderilebilir
// fetch("https://api.site.com/auth", {method:"POST", body:JSON.stringify({code})})

}else{

document.body.innerHTML = "<h2>Doğrulama başarısız.</h2>";

}

</script>

</body>
</html>
